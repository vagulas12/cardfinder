{{if .Cards}}
    <div class="card-grid">
    {{range .Cards}}
        <div class="card" 
             hx-get="/card/{{.ID}}" 
             hx-target="#results" 
             hx-swap="innerHTML"
             hx-push-url="true">
            <img src="{{.Images.Small}}" alt="{{.Name}}">
            <div class="card-info">
                <div class="card-name">{{.Name}}</div>
                <div class="card-meta">
                    {{.Set.Name}}
                    {{if .Rarity}} • {{.Rarity}}{{end}}
                    {{if .HP}} • HP {{.HP}}{{end}}
                </div>
            </div>
        </div>
    {{end}}
    </div>
{{else}}
    <p class="no-results">No cards found.</p>
{{end}}
